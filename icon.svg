<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Shine overlay -->
  <rect width="512" height="256" rx="112" fill="url(#shine)"/>
  <rect y="112" width="512" height="144" fill="url(#shine)"/>

  <!-- Timetable lines (decorative, top area) -->
  <rect x="72" y="108" width="368" height="22" rx="11" fill="rgba(255,255,255,0.24)"/>
  <rect x="72" y="148" width="272" height="22" rx="11" fill="rgba(255,255,255,0.14)"/>
  <rect x="72" y="188" width="180" height="22" rx="11" fill="rgba(255,255,255,0.08)"/>

  <!-- LMG -->
  <text
    x="256" y="412"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="216" font-weight="900"
    fill="white" text-anchor="middle"
    letter-spacing="-6">LMG</text>
</svg>
