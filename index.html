<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- Apply dark mode before first paint to avoid flash -->
  <script>try{if(JSON.parse(localStorage.getItem('vplan_settings')||'{}').dark)document.documentElement.setAttribute('data-dark','')}catch{}</script>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1d4ed8">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LMG Vplan">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="icon.svg">

  <title>LMG Vertretungsplan</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header id="header">
    <div class="app-title">
      <img src="icon.svg" class="app-logo" alt="" aria-hidden="true">
      <span>LMG Vertretungsplan</span>
    </div>
    <div class="header-actions">
      <button id="reset-btn" class="icon-btn" aria-label="Cache leeren und neu laden" title="Neu laden">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-.49-4.49"/>
        </svg>
      </button>
      <button id="settings-btn" class="icon-btn" aria-label="Einstellungen" title="Einstellungen">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Week navigation bar -->
  <div id="week-bar">
    <button id="prev-week-btn" class="nav-btn" aria-label="Vorwoche">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <span id="week-label">KW ??</span>
    <button id="next-week-btn" class="nav-btn" aria-label="Nächste Woche">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <!-- Last updated -->
  <div id="last-updated"></div>

  <!-- Error banner (hidden by default) -->
  <div id="error-banner" class="error-banner hidden"></div>

  <!-- Main content -->
  <main id="content">
    <div class="loading">Lade Vertretungsplan&hellip;</div>
  </main>

  <!-- Settings overlay -->
  <div id="settings-overlay" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Einstellungen">
    <div class="overlay-card">
      <h2>Einstellungen</h2>
      <form id="settings-form" autocomplete="off">
        <label for="s-url">URL des Vertretungsplans</label>
        <input type="url" id="s-url" name="url" placeholder="https://…/default.htm" required>

        <label for="s-user">Benutzername</label>
        <input type="text" id="s-user" name="user" autocomplete="username">

        <label for="s-pass">Passwort</label>
        <input type="password" id="s-pass" name="pass" autocomplete="current-password">

        <label for="s-klasse">Klasse</label>
        <input type="text" id="s-klasse" name="klasse" placeholder="z. B. 10a" required>

        <!-- Dark mode toggle -->
        <div class="settings-toggle-row">
          <label for="s-darkmode" class="toggle-label">Dark Mode</label>
          <label class="toggle-switch">
            <input type="checkbox" id="s-darkmode" name="darkmode">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>

        <div class="form-actions">
          <button type="button" id="settings-cancel-btn" class="btn-secondary">Abbrechen</button>
          <button type="submit" class="btn-primary">Speichern</button>
        </div>
      </form>

      <!-- Debug section — shown only after data loads -->
      <div id="debug-section" class="hidden">
        <div class="settings-divider"></div>
        <button type="button" id="debug-toggle-btn" class="debug-toggle-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
          <span id="debug-toggle-label">Diagnose anzeigen</span>
        </button>
        <div id="debug-container" class="hidden"></div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
